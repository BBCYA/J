// ── LocalStorage Save/Load ──
const STORAGE_KEY = 'trainingExamData';

function saveToLocalStorage() {
  const data = {
    persons,
    nextId,
    config: {
      exam_item: defaultConfig.exam_item,
      officer_in_charge: defaultConfig.officer_in_charge,
      coordinator: defaultConfig.coordinator,
      batch_number: defaultConfig.batch_number,
    }
  };
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (e) {
    console.error('Failed to save to localStorage:', e);
  }
}

function loadFromLocalStorage() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const data = JSON.parse(saved);
      if (data.persons && Array.isArray(data.persons)) {
        persons = data.persons;
      }
      if (data.nextId) {
        nextId = data.nextId;
      }
      if (data.config) {
        Object.assign(defaultConfig, data.config);
      }
    }
  } catch (e) {
    console.error('Failed to load from localStorage:', e);
  }
}

const STATUS_LABEL = {
  tested:'已測', untested:'未測', incident:'事故',
  leave:'請假', duty:'公差', sick:'傷病'
};
const RANK_LABEL = { officer:'官', nco:'士', soldier:'兵' };
const ANOMALY_STATUSES = ['incident','leave','duty','sick'];

// ── Render ──
function render() {
  saveToLocalStorage();
  const list = document.getElementById('person-list');
  const hint = document.getElementById('empty-hint');
  const filtered = persons.filter(p =>
    currentFilter === 'all' || p.rank === currentFilter
  );

  if (filtered.length === 0) {
    list.innerHTML = ''; hint.classList.remove('hidden');
  } else {
    hint.classList.add('hidden');
    // Group by rank
    const groups = [
      { key:'officer', label:'官', color:'rank-officer' },
      { key:'nco',     label:'士', color:'rank-nco' },
      { key:'soldier', label:'兵', color:'rank-soldier' },
    ];
    let html = '';
    for (const g of groups) {
      const gp = filtered.filter(p => p.rank === g.key);
      if (gp.length === 0) continue;
      if (currentFilter === 'all') {
        html += `<div class="flex items-center gap-2 mb-2 mt-3 first:mt-0">
          <span class="text-xs font-semibold px-2 py-0.5 rounded-md ${g.color}">${g.label}</span>
          <div class="flex-1 h-px bg-gray-100"></div>
          <span class="text-xs text-gray-400">${gp.length} 員</span>
        </div>`;
      }
      html += '<div class="grid grid-cols-2 gap-2">';
      for (const p of gp) {
        const scls = `status-${p.status}`;
        html += `
          <button class="person-btn glass-card rounded-2xl p-3 text-left" onclick="openStatusModal(${p.id})">
            <div class="flex items-center justify-between mb-1.5">
              <span class="text-sm font-bold text-gray-900">${p.name}</span>
              <span class="text-xs px-2 py-0.5 rounded-full font-medium ${scls}">${STATUS_LABEL[p.status]}</span>
            </div>
            <div class="flex items-center gap-1.5">
              <span class="text-xs px-1.5 py-0.5 rounded-md font-medium ${g.color}">${g.label}</span>
              <span class="text-xs text-gray-400">${p.note || ''}</span>
            </div>
          </button>`;
      }
      html += '</div>';
    }
    list.innerHTML = html;
  }
  updateStats();
  lucide.createIcons();
}

function updateStats() {
  const total = persons.length;
  const byRank = r => persons.filter(p=>p.rank===r).length;
  const tested = persons.filter(p=>p.status==='tested');
  const anomaly = persons.filter(p=>ANOMALY_STATUSES.includes(p.status));

  document.getElementById('s-total').textContent = total;
  document.getElementById('s-off').textContent = byRank('officer');
  document.getElementById('s-nco').textContent = byRank('nco');
  document.getElementById('s-sol').textContent = byRank('soldier');

  document.getElementById('s-tested').textContent = tested.length;
  document.getElementById('s-tested-off').textContent = tested.filter(p=>p.rank==='officer').length;
  document.getElementById('s-tested-nco').textContent = tested.filter(p=>p.rank==='nco').length;
  document.getElementById('s-tested-sol').textContent = tested.filter(p=>p.rank==='soldier').length;

  document.getElementById('s-anomaly').textContent = anomaly.length;
  document.getElementById('s-anom-off').textContent = anomaly.filter(p=>p.rank==='officer').length;
  document.getElementById('s-anom-nco').textContent = anomaly.filter(p=>p.rank==='nco').length;
  document.getElementById('s-anom-sol').textContent = anomaly.filter(p=>p.rank==='soldier').length;

  const cpct = total > 0 ? Math.round(tested.length/total*100) : 0;
  const apct = total > 0 ? Math.round(anomaly.length/total*100) : 0;
  document.getElementById('completion-pct').textContent = cpct+'%';
  document.getElementById('completion-bar').style.width = cpct+'%';
  document.getElementById('anomaly-pct').textContent = apct+'%';
  document.getElementById('anomaly-bar').style.width = apct+'%';

  // Status badge
  const badge = document.getElementById('status-badge');
  if (total === 0) { badge.textContent = '未開始'; badge.className = badge.className.replace(/bg-\w+-\d+/, 'bg-gray-400'); }
  else if (cpct + apct >= 100) { badge.textContent = '已完成'; badge.className = badge.className.replace(/bg-\w+-\d+/, 'bg-blue-500'); }
  else { badge.textContent = '進行中'; badge.className = badge.className.replace(/bg-\w+-\d+/, 'bg-green-500'); }
}

  render();
}

// ── Select All ──
function selectAllPersons() {
  const filtered = persons.filter(p =>
    currentFilter === 'all' || p.rank === currentFilter
  );
  if (filtered.length === 0) return;
  
  // 建立多選模式
  const selectedIds = new Set(filtered.map(p => p.id));
  
  // 顯示批量狀態選擇視窗
  openBulkStatusModal(selectedIds);
}

}
function closeAddModal() { document.getElementById('add-modal').classList.add('hidden'); }
function closeAddIfOutside(e) { if(e.target===document.getElementById('add-modal')) closeAddModal(); }

  addRank = r;

}
function addPerson() {
  const name = document.getElementById('input-name').value.trim();
  if (!name) { document.getElementById('input-name').focus(); return; }
  persons.push({ id:nextId++, name, rank:addRank, note:document.getElementById('input-note').value.trim(), status:'untested', statusNote:'' });
  closeAddModal();
  render();
}

// ── Status Modal ──
function openStatusModal(id) {
  editingId = id;
  pendingStatus = null;
  const p = persons.find(x=>x.id===id);
  const rcls = `rank-${p.rank}`;
  document.getElementById('status-modal-header').innerHTML = `
    <div class="flex items-center gap-3">
      <div class="w-12 h-12 rounded-2xl bg-gray-100 flex items-center justify-center text-xl font-bold text-gray-700">${p.name[0]}</div>
      <div>
        <p class="text-lg font-bold text-gray-900">${p.name}</p>
        <div class="flex gap-2 mt-0.5">
          <span class="text-xs px-2 py-0.5 rounded-md font-medium ${rcls}">${RANK_LABEL[p.rank]}</span>
          ${p.note ? `<span class="text-xs text-gray-400">${p.note}</span>` : ''}
          <span class="text-xs px-2 py-0.5 rounded-full font-medium status-${p.status}">${STATUS_LABEL[p.status]}</span>
        </div>
      </div>
    </div>`;
  document.getElementById('status-note').value = p.statusNote || '';
  // 固定人員無法刪除
  const deleteBtn = document.getElementById('delete-btn');
  deleteBtn.style.display = p.fixed ? 'none' : 'block';
  document.getElementById('status-modal').classList.remove('hidden');
}
function closeStatusModal() { document.getElementById('status-modal').classList.add('hidden'); editingId=null; pendingStatus=null; }
function closeStatusIfOutside(e) { if(e.target===document.getElementById('status-modal')) closeStatusModal(); }
function setStatus(s) {
  pendingStatus = s;
  document.querySelectorAll('.status-option').forEach(b=>b.style.opacity='0.45');
  event.currentTarget.style.opacity='1';
}
function confirmStatus() {
  if (!pendingStatus || !editingId) { closeStatusModal(); return; }
  const p = persons.find(x=>x.id===editingId);
  if (p) {
    p.status = pendingStatus;
    p.statusNote = document.getElementById('status-note').value.trim();
  }
  closeStatusModal();
  render();
}
function deletePerson() {
  if (!editingId) return;
  const p = persons.find(x=>x.id===editingId);
  if (p && p.fixed) return; // 固定人員無法刪除
  persons = persons.filter(p=>p.id!==editingId);
  closeStatusModal();
  render();
}

// ── Bulk Status Modal ──
function openBulkStatusModal(selectedIds) {
  bulkSelectedIds = selectedIds;
  pendingStatus = null;
  const count = selectedIds.size;
  document.getElementById('status-modal-header').innerHTML = `
    <div class="mb-2">
      <p class="text-lg font-bold text-gray-900">批量設定狀態</p>
      <p class="text-sm text-gray-500 mt-1">已選擇 ${count} 人</p>
    </div>`;
  document.getElementById('status-note').value = '';
  document.getElementById('delete-btn').style.display = 'none';
  document.getElementById('status-modal').classList.remove('hidden');
}

function confirmBulkStatus() {
  if (!pendingStatus || !bulkSelectedIds) { closeStatusModal(); return; }
  const statusNote = document.getElementById('status-note').value.trim();
  for (const id of bulkSelectedIds) {
    const p = persons.find(x=>x.id===id);
    if (p) {
      p.status = pendingStatus;
      p.statusNote = statusNote;
    }
  }
  bulkSelectedIds = null;
  closeStatusModal();
  render();
}

// ── Category Modal ──
function openCategoryModal(category) {
  const titleMap = { all: '應測人員', tested: '已測人員', anomaly: '缺/事故人員' };
  const statusMap = {
    all: p => true,
    tested: p => p.status === 'tested',
    anomaly: p => ANOMALY_STATUSES.includes(p.status)
  };

  const filtered = persons.filter(statusMap[category] || (p => true));
  document.getElementById('category-title').textContent = titleMap[category] || '人員列表';
  document.getElementById('category-count').textContent = `共 ${filtered.length} 人`;

  let html = '';
  const groups = [
    { key:'officer', label:'官', color:'rank-officer' },
    { key:'nco',     label:'士', color:'rank-nco' },
    { key:'soldier', label:'兵', color:'rank-soldier' },
  ];

  for (const g of groups) {
    const gp = filtered.filter(p => p.rank === g.key);
    if (gp.length === 0) continue;
    html += `<div class="flex items-center gap-2 mb-2 mt-2 first:mt-0">
      <span class="text-xs font-semibold px-2 py-0.5 rounded-md ${g.color}">${g.label}</span>
      <div class="flex-1 h-px bg-gray-100"></div>
      <span class="text-xs text-gray-400">${gp.length}</span>

    for (const p of gp) {
      const scls = `status-${p.status}`;
      html += `
        <button onclick="openStatusModal(${p.id}); closeCategoryModal();" class="w-full glass-card rounded-2xl p-3 text-left hover:shadow-md transition-shadow">
          <div class="flex items-center justify-between">
            <div class="flex-1">
              <p class="text-sm font-bold text-gray-900">${p.name}</p>
              <div class="flex items-center gap-1.5 mt-1">
                <span class="text-xs px-1.5 py-0.5 rounded-md font-medium ${g.color}">${g.label}</span>
                <span class="text-xs text-gray-400">${p.note || ''}</span>
              </div>
            </div>
            <span class="text-xs px-2 py-0.5 rounded-full font-medium ${scls} whitespace-nowrap ml-2">${STATUS_LABEL[p.status]}</span>
          </div>
          ${p.statusNote ? `<p class="text-xs text-gray-500 mt-2">備註: ${p.statusNote}</p>` : ''}
        </button>`;
    }
  }

  document.getElementById('category-list').innerHTML = html;
  document.getElementById('category-modal').classList.remove('hidden');
  lucide.createIcons();
}

function closeCategoryModal() { document.getElementById('category-modal').classList.add('hidden'); }
